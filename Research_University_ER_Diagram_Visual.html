
<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; font-family: "Anthropic Sans", sans-serif; }
.er-wrap { width: 100%; overflow-x: auto; padding: 12px 0; }
svg text { font-family: "Anthropic Sans", sans-serif; }

.entity-header { fill: #534AB7; }
.entity-header-text { fill: #fff; font-size: 13px; font-weight: 600; }
.entity-body { fill: var(--color-background-secondary, #f5f5f3); }
.entity-border { fill: none; stroke: #7F77DD; stroke-width: 1.2; }
.field-text { font-size: 11px; fill: var(--color-text-primary, #2c2c2a); }
.field-type { font-size: 10px; fill: var(--color-text-secondary, #5F5E5A); }
.field-pk { font-size: 9px; fill: #534AB7; font-weight: 600; }

.entity-header-green { fill: #0F6E56; }
.entity-border-green { stroke: #1D9E75; }
.entity-header-blue { fill: #185FA5; }
.entity-border-blue { stroke: #378ADD; }
.entity-header-amber { fill: #854F0B; }
.entity-border-amber { stroke: #BA7517; }
.entity-header-gray { fill: #5F5E5A; }
.entity-border-gray { stroke: #888780; }

.rel-line { stroke: #888780; stroke-width: 1.2; fill: none; }
.rel-label { font-size: 10px; fill: var(--color-text-secondary, #5F5E5A); }
.inh-line { stroke: #7F77DD; stroke-width: 1.5; fill: none; stroke-dasharray: 6 3; }
.section-label { font-size: 11px; font-weight: 600; fill: var(--color-text-secondary, #5F5E5A); letter-spacing: 0.5px; }
</style>
</head>
